version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: third_eye_traffic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai_engine:
    build: ./ai_engine
    ports:
      - "8000:8000"
    volumes:
      - ./evidence:/app/evidence
    depends_on:
      - postgres

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./evidence:/app/evidence
    depends_on:
      - postgres
      - mongodb
      - ai_engine
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
